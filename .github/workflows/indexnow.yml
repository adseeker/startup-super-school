name: IndexNow — Submit changed URLs

on:
  push:
    branches:
      - main

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Get changed content files
        id: changed
        run: |
          FILES=$(git diff --name-only HEAD~1 HEAD -- 'src/content/**/*.md' | tr '\n' '\n')
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$FILES" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Skip if no content changes
        if: steps.changed.outputs.files == ''
        run: echo "No content files changed — skipping IndexNow submission."

      - name: Submit to IndexNow
        if: steps.changed.outputs.files != ''
        run: node scripts/submit-indexnow.mjs
        env:
          CHANGED_FILES: ${{ steps.changed.outputs.files }}
