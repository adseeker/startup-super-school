<svg xmlns="http://www.w3.org/2000/svg" width="900" height="626" viewBox="0 0 900 626"><rect width="900" height="626" rx="12" fill="white"/><rect width="900" height="626" rx="12" fill="none" stroke="#E5E7EB" stroke-width="1.5"/><rect width="900" height="130" rx="12" fill="#059669"/><rect y="118" width="900" height="12" fill="#059669"/><text x="44" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="1">GROWTH · INTERMEDIATE</text><text x="856" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">startupsuperschool.com</text><text x="44" y="76" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="white">SEO for Startups</text><circle cx="58" cy="174" r="14" fill="#ECFDF5"/><text x="58" y="179" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">1</text><text x="84" y="159" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Why SEO Matters for Startups on a Tight Budget</text><text x="84" y="181" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Paid acquisition costs money every single day.</text><line x1="44" y1="218" x2="856" y2="218" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="262" r="14" fill="#ECFDF5"/><text x="58" y="267" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">2</text><text x="84" y="247" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Step 1: Audit Your Current Organic Baseline</text><text x="84" y="269" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Before building, understand what you already have.</text><line x1="44" y1="306" x2="856" y2="306" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="350" r="14" fill="#ECFDF5"/><text x="58" y="355" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">3</text><text x="84" y="335" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Step 2: Research Keywords Your Buyers Actually Use</text><text x="84" y="357" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Keyword research is the most important leverage point in SEO.</text><line x1="44" y1="394" x2="856" y2="394" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="438" r="14" fill="#ECFDF5"/><text x="58" y="443" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">4</text><text x="84" y="423" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Step 3: Map One Keyword Cluster to One Page</text><text x="84" y="445" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Keyword cannibalization — multiple pages targeting the same query — is one</text><text x="84" y="464" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">of the most common startup SEO mistakes.</text><line x1="44" y1="482" x2="856" y2="482" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="526" r="14" fill="#ECFDF5"/><text x="58" y="531" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">5</text><text x="84" y="511" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Step 4: Implement On-Page Fundamentals</text><text x="84" y="533" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">On-page SEO refers to everything you control on a single page.</text><line x1="0" y1="570" x2="900" y2="570" stroke="#E5E7EB" stroke-width="1"/><rect x="44" y="587" width="46.8" height="22" rx="4" fill="#ECFDF5"/><text x="67.4" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#seo</text><rect x="96.8" y="587" width="68.4" height="22" rx="4" fill="#ECFDF5"/><text x="131" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#growth</text><rect x="171.2" y="587" width="147.6" height="22" rx="4" fill="#ECFDF5"/><text x="245" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#content marketing</text><rect x="324.79999999999995" y="587" width="75.6" height="22" rx="4" fill="#ECFDF5"/><text x="362.59999999999997" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#organic</text><rect x="406.4" y="587" width="104.4" height="22" rx="4" fill="#ECFDF5"/><text x="458.59999999999997" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#acquisition</text></svg>