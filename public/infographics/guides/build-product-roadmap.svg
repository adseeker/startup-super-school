<svg xmlns="http://www.w3.org/2000/svg" width="900" height="626" viewBox="0 0 900 626"><rect width="900" height="626" rx="12" fill="white"/><rect width="900" height="626" rx="12" fill="none" stroke="#E5E7EB" stroke-width="1.5"/><rect width="900" height="130" rx="12" fill="#059669"/><rect y="118" width="900" height="12" fill="#059669"/><text x="44" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="1">PRODUCT · INTERMEDIATE</text><text x="856" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">startupsuperschool.com</text><text x="44" y="76" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="white">How to Build a Startup Product Roadmap</text><circle cx="58" cy="174" r="14" fill="#ECFDF5"/><text x="58" y="179" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">1</text><text x="84" y="159" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">What a Product Roadmap Is (and Is Not)</text><text x="84" y="181" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">A product roadmap is not a feature list.</text><line x1="44" y1="218" x2="856" y2="218" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="262" r="14" fill="#ECFDF5"/><text x="58" y="267" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">2</text><text x="84" y="247" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Why Roadmaps Fail at Startups</text><text x="84" y="269" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Most startup roadmaps fail for three reasons.</text><line x1="44" y1="306" x2="856" y2="306" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="350" r="14" fill="#ECFDF5"/><text x="58" y="355" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">3</text><text x="84" y="335" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">The Now / Next / Later Framework</text><text x="84" y="357" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">The most effective roadmap structure for pre-Series A startups is the Now</text><text x="84" y="376" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">/ Next / Later framework.</text><line x1="44" y1="394" x2="856" y2="394" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="438" r="14" fill="#ECFDF5"/><text x="58" y="443" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">4</text><text x="84" y="423" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Inputs to the Roadmap: Where Priorities Actually Come From</text><text x="84" y="445" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">The biggest failure mode in product planning is building from internal</text><text x="84" y="464" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">assumptions.</text><line x1="44" y1="482" x2="856" y2="482" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="526" r="14" fill="#ECFDF5"/><text x="58" y="531" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#059669" text-anchor="middle">5</text><text x="84" y="511" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">How to Prioritize: RICE and ICE Scoring</text><text x="84" y="533" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">When you have more potential items than capacity — which is always — you</text><text x="84" y="552" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">need a repeatable prioritization method.</text><line x1="0" y1="570" x2="900" y2="570" stroke="#E5E7EB" stroke-width="1"/><rect x="44" y="587" width="75.6" height="22" rx="4" fill="#ECFDF5"/><text x="81.8" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#product</text><rect x="125.6" y="587" width="75.6" height="22" rx="4" fill="#ECFDF5"/><text x="163.39999999999998" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#roadmap</text><rect x="207.2" y="587" width="82.8" height="22" rx="4" fill="#ECFDF5"/><text x="248.6" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#planning</text><rect x="296" y="587" width="54" height="22" rx="4" fill="#ECFDF5"/><text x="323" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#team</text><rect x="356" y="587" width="82.8" height="22" rx="4" fill="#ECFDF5"/><text x="397.4" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#059669" text-anchor="middle">#strategy</text></svg>