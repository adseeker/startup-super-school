<svg xmlns="http://www.w3.org/2000/svg" width="900" height="626" viewBox="0 0 900 626"><rect width="900" height="626" rx="12" fill="white"/><rect width="900" height="626" rx="12" fill="none" stroke="#E5E7EB" stroke-width="1.5"/><rect width="900" height="130" rx="12" fill="#4F46E5"/><rect y="118" width="900" height="12" fill="#4F46E5"/><text x="44" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="600" fill="rgba(255,255,255,0.7)" letter-spacing="1">FINANCE · BEGINNER</text><text x="856" y="30" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" fill="rgba(255,255,255,0.5)" text-anchor="end">startupsuperschool.com</text><text x="44" y="76" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="28" font-weight="700" fill="white">Burn Rate</text><circle cx="58" cy="174" r="14" fill="#EEF2FF"/><text x="58" y="179" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" text-anchor="middle">1</text><text x="84" y="159" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">What Is Burn Rate?</text><text x="84" y="181" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">There are two types:</text><line x1="44" y1="218" x2="856" y2="218" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="262" r="14" fill="#EEF2FF"/><text x="58" y="267" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" text-anchor="middle">2</text><text x="84" y="247" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Why It Matters</text><text x="84" y="269" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">Burn rate answers the most existential question for any pre-profitability</text><text x="84" y="288" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">startup: how long until we run out of money?</text><line x1="44" y1="306" x2="856" y2="306" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="350" r="14" fill="#EEF2FF"/><text x="58" y="355" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" text-anchor="middle">3</text><text x="84" y="335" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Example</text><text x="84" y="357" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">At $70k net burn, this company has roughly 5 months of runway ($360k ÷</text><text x="84" y="376" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">$70k).</text><line x1="44" y1="394" x2="856" y2="394" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="438" r="14" fill="#EEF2FF"/><text x="58" y="443" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" text-anchor="middle">4</text><text x="84" y="423" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">What's a &quot;Good&quot; Burn Rate?</text><text x="84" y="445" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">There's no universal answer — it depends on stage, sector, and growth</text><text x="84" y="464" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">rate.</text><line x1="44" y1="482" x2="856" y2="482" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="526" r="14" fill="#EEF2FF"/><text x="58" y="531" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#4F46E5" text-anchor="middle">5</text><text x="84" y="532" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">Controlling Burn Rate</text><line x1="0" y1="570" x2="900" y2="570" stroke="#E5E7EB" stroke-width="1"/><rect x="44" y="587" width="75.6" height="22" rx="4" fill="#EEF2FF"/><text x="81.8" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#4F46E5" text-anchor="middle">#finance</text><rect x="125.6" y="587" width="75.6" height="22" rx="4" fill="#EEF2FF"/><text x="163.39999999999998" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#4F46E5" text-anchor="middle">#metrics</text><rect x="207.2" y="587" width="104.4" height="22" rx="4" fill="#EEF2FF"/><text x="259.4" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#4F46E5" text-anchor="middle">#fundraising</text><rect x="317.6" y="587" width="90" height="22" rx="4" fill="#EEF2FF"/><text x="362.6" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#4F46E5" text-anchor="middle">#cash flow</text></svg>