ention nor acquisition is universally correct.</text><line x1="44" y1="482" x2="856" y2="482" stroke="#E5E7EB" stroke-width="1"/><circle cx="58" cy="526" r="14" fill="#FFF1F2"/><text x="58" y="531" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" font-weight="700" fill="#E11D48" text-anchor="middle">5</text><text x="84" y="511" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="15" font-weight="600" fill="#111827">How to Measure Both</text><text x="84" y="533" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="13" fill="#6B7280">NRR is the multiplier on your CAC investment.</text><line x1="0" y1="570" x2="900" y2="570" stroke="#E5E7EB" stroke-width="1"/><rect x="44" y="587" width="90" height="22" rx="4" fill="#FFF1F2"/><text x="89" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#E11D48" text-anchor="middle">#retention</text><rect x="140" y="587" width="104.4" height="22" rx="4" fill="#FFF1F2"/><text x="192.2" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#E11D48" text-anchor="middle">#acquisition</text><rect x="250.4" y="587" width="68.4" height="22" rx="4" fill="#FFF1F2"/><text x="284.6" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#E11D48" text-anchor="middle">#growth</text><rect x="324.8" y="587" width="61.2" height="22" rx="4" fill="#FFF1F2"/><text x="355.40000000000003" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11" font-weight="500" fill="#E11D48" text-anchor="middle">#churn</text><rect x="392" y="587" width="46.8" height="22" rx="4" fill="#FFF1F2"/><text x="415.4" y="602" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Ar